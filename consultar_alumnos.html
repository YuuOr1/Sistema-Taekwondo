<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Consulta de Alumnos - Sistema Taekwondo</title>
    <link rel="stylesheet" href="assets/css/consultar_alumnos.css">

</head>

<body>
    <header>
        <div class="logo-container">
            <img src="assets/img/logo.png" class="logo">
            <div>
                <h1>Sistema Integral de Gestión</h1>
                <p>Instituto Mexicano Moo Pal Kwan</p>
            </div>
        </div>
        <nav>
            <a href="dashboard.html">Panel</a>
            <a href="inicio.html">Inicio</a>
            <a href="login.html" class="logout-btn">Cerrar sesión</a>
        </nav>
    </header>

    <div class="page-content">

        <div class="page-title-row">
            <div>
                <h2>Consulta de Alumnos</h2>
                <p class="subtitle"></p>
            </div>
        </div>

        <div class="toolbar">
            <div class="search-group">
                <input type="text" placeholder="  Buscar alumno..." id="query">
                <button class="btn-search">Buscar</button>
            </div>
            <div class="action-buttons">
                <button class="btn-edit">Editar alumno</button>
                <button class="btn-register" onclick="window.location.href='registroAlumnos.html'">＋ Registrar alumno</button>
            </div>
        </div>

        <div class="table-wrapper">
            <table class="tabla-alumnos">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Nombre</th>
                        <th>F. Nacimiento</th>
                        <th>Edad</th>
                        <th>F. Ingreso</th>
                        <th>F. Últ. Examen</th>
                        <th>Cinta Actual</th>
                        <th>Próx. Cinta</th>
                        <th>Empresa</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody id="tabla-resultados">
                </tbody>
            </table>
        </div>

    </div>

    <footer>
        <p>Instituto Mexicano Moo Pal Kwan — Sistema de gestión de torneos</p>
    </footer>

    <script src="assets/js/consultar_alumnos.js"></script>
</body>
</html>
