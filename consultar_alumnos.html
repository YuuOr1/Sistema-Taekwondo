<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Consulta - Sistema Taekwondo</title>
    <link rel="stylesheet" href="css/consultar_alumnos.css">
    <link rel="stylesheet" href="css/menu.css">
</head>

<body>
    <div id="menu"></div>

    <div class="div-query">
        <h1>Consulta de alumnos</h1>
        <div class="query-input">
            <input type="text" placeholder="Buscar alumno..." id="query">
            <button class="button-search">buscar</button>
        </div>
    </div>

    <script>
    fetch("menu.html")
        .then(response => response.text())
        .then(data => {
        document.getElementById("menu").innerHTML = data;
    });
    </script>

<div class="query-tables">

    <table class="tabla-alumnos">

        <thead>
            <tr>
                <th>ID</th>
                <th>Nombre</th>
                <th>F. Nacimiento</th>
                <th>Edad</th>
                <th>F. ingreso</th>
                <th>F. Exa. Ant.</th>
                <th>Cinta</th>
                <th>Prox. Cinta</th>
                <th>Empresa</th>
                <th>Acciones</th>
            </tr>
        </thead>

        <tbody id="tabla-resultados">
        </tbody>

    </table>

</div>

    <script src="js/consultar_alumnos.js"></script>
</body>
</html>
