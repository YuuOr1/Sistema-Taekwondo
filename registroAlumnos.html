<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="registroAlumnos.css">
    <title>Moo Pal Kwan</title>
</head>
    
<body>
    <header>
        <div class = "contenedorHeader">
            <h1>Instituto Mexicano M.P.K TAE KWON DO</h1>
            <div class = "logo">
                <img class = "img_logo", src="./img/logo.png" >
            </div>
        </div>
    </header>

    <main>
        <div class="contenedorMain">
            <h2> Registro de alumnos </h2>
            <div class="contenedorPrincipal">
                <h3> Nombre </h3>
                <input type="text">
                <h3> Fecha de nacimiento</h3>
                <input type="date">
                <h3> Edad </h3>
                <input type="text">
                <h3> Ocupacion </h3>
                <input type="text">
                <h3>Estado civil </h3>
                <label for="opcion"></label>
                <select name="opcion" id="opcion">
                    <option value="1">Soltero(a)</option>
                    <option value="2">Casado(a)</option>
                    <option value="3">Alejado(a)</option>
                    <option value="4">Otro</option>
                </select>
                <h3> Fecha de ingreso </h3>
                <input type="date">
                <h3> Grado actual</h3>
                <input type="text">
                <h3> Grado a seguir</h3>
                <input type="text">
                <H3> Telefono tutor</H3>
                <input type="text">
                <h3> Correo tutor </h3>
                <input type="email">

                <input type="submit" name="" id="botonEnviar">
            </div>
    </main>
    
</body>
</html>
