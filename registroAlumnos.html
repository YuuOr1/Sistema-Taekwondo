<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="css/registroAlumnos.css">
<title>Moo Pal Kwan</title>
</head>
<body>
<header>
    <div class="contenedorHeader">
        <h1>Instituto Mexicano M.P.K TAE KWON DO</h1>
        <div class="logo">
            <img class="img_logo" src="./img/logo.png">
        </div>
    </div>
</header>
<main>
    <div class="contenedorMain">
        <h2>Registro de alumnos</h2>
        <div class="contenedorPrincipal">

            <div class="subConIzq">
                <h3>Nombre</h3>
                <input type="text" placeholder="Nombre completo">
                <h3>Fecha de nacimiento</h3>
                <input type="date">
                <h3>Edad</h3>
                <input type="text" placeholder="Edad">
                <h3>Ocupación</h3>
                <input type="text" placeholder="Ocupación">
                <h3>Estado civil</h3>
                <select name="opcionEstado" id="opcionEstado">
                    <option value="1">Soltero(a)</option>
                    <option value="2">Casado(a)</option>
                    <option value="3">Divorciado(a)</option>
                    <option value="4">Otro</option>
                </select>
            </div>

            <div class="subConMedio">
                <h3>Fecha de ingreso</h3>
                <input type="date">
                <h3>Grado actual</h3>
                <select name="opcionCinta" id="opcionCinta">
                    <option value="1">10 Gup</option>
                    <option value="2">9 Gup</option>
                    <option value="3">8 Gup</option>
                    <option value="4">7 Gup</option>
                    <option value="5">6 Gup</option>
                    <option value="6">5 Gup</option>
                    <option value="7">4 Gup</option>
                    <option value="8">3 Gup</option>
                    <option value="9">2 Gup</option>
                    <option value="10">1 Gup</option>
                </select>
                <h3>Grado a seguir</h3>
                <select name="sigCinta" id="sigCinta">
                    <option value="1">10 Gup</option>
                    <option value="2">9 Gup</option>
                    <option value="3">8 Gup</option>
                    <option value="4">7 Gup</option>
                    <option value="5">6 Gup</option>
                    <option value="6">5 Gup</option>
                    <option value="7">4 Gup</option>
                    <option value="8">3 Gup</option>
                    <option value="9">2 Gup</option>
                    <option value="10">1 Gup</option>
                </select>
            </div>

            <div class="subConDer">
                <h3>Teléfono tutor</h3>
                <input type="text" placeholder="Número de teléfono">
                <h3>Correo tutor</h3>
                <input type="email" placeholder="correo@ejemplo.com">
            </div>

            <div>
                <input type="submit" value="Registrar alumno" id="botonEnviar">
            </div>

        </div>
    </div>
</main>
<script src="js/registroAlumnos.js"></script>
</body>
</html>
